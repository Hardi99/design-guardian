global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Local development — backend runs on port 3001
  - job_name: design-guardian-local
    static_configs:
      - targets:
          - host.docker.internal:3001
    metrics_path: /metrics
    scheme: http

  # Production — Railway deployment
  - job_name: design-guardian-prod
    static_configs:
      - targets:
          - design-guardian.up.railway.app
    metrics_path: /metrics
    scheme: https
