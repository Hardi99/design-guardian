name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      # Quality Gate : le seuil ≥80% (statements/lines/functions) est appliqué
      # nativement par Vitest (coverage.thresholds dans vitest.config.ts).
      # Cette step échoue automatiquement si la couverture passe sous 80%.
      - name: Unit tests + coverage (Quality Gate ≥ 80%)
        run: bun run test:coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'placeholder' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder' }}
          NODE_ENV: test

      - name: Build
        run: bun run build

  # ─── Plugin ───────────────────────────────────────────────────────────────────
  plugin:
    name: Plugin — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build plugin
        run: npm run build
