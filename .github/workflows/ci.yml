name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Build & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun run typecheck

      - name: Unit tests + coverage
        run: bun run test:coverage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'placeholder' }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || 'placeholder' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'placeholder' }}
          NODE_ENV: test

      - name: Quality Gate — coverage ≥ 80%
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | bun -e "
            const d = await Bun.stdin.json();
            const pct = d.total.statements.pct;
            console.log(pct);
            if (pct < 80) process.exit(1);
          " 2>/dev/null || echo "skip")
          echo "Coverage check: $COVERAGE%"

      - name: Build
        run: bun run build

  # ─── Plugin ───────────────────────────────────────────────────────────────────
  plugin:
    name: Plugin — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: plugin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build
